name: Release to NuGet

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 3.1.4)'
        required: true
        type: string

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Get version
      id: version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=${GITHUB_REF#refs/tags/v}
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
    
    - run: dotnet restore MessagePack.sln
    
    - run: dotnet build MessagePack.sln -c Release -p:Version=${{ steps.version.outputs.VERSION }}
    
    - run: dotnet test MessagePack.sln -c Release --no-build
    
    - run: dotnet pack MessagePack.sln -c Release --no-build -o ./artifacts -p:Version=${{ steps.version.outputs.VERSION }}
    
    - uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: MessagePack for C# v${{ steps.version.outputs.VERSION }}
        body: |
          Release v${{ steps.version.outputs.VERSION }}
          
          ### Breaking Changes
          - Minimum .NET version is now 10.0
          - Unity support removed (use v2.x for Unity)
        draft: false
        prerelease: false
    
    - name: Publish to NuGet
      if: secrets.NUGET_API_KEY != ''
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate
