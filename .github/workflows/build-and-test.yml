name: Build & Test (.NET 9)

on:
  push:
    branches: [ main, master, upgrade-to-NET9, develop ]
  pull_request:
    branches: [ main, master, upgrade-to-NET9, develop ]

env:
  DOTNET_VERSION: '9.0.x'
  CONFIGURATION: Release

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Display .NET info
      run: dotnet --info
    
    - name: Restore dependencies
      run: dotnet restore MessagePack.sln
    
    - name: Build solution
      run: dotnet build MessagePack.sln --configuration ${{ env.CONFIGURATION }} --no-restore --verbosity minimal
    
    - name: Run unit tests
      run: dotnet test MessagePack.sln --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal --results-directory ./test-results --logger "trx;LogFileName=test-results.trx" --logger "console;verbosity=normal"
      continue-on-error: false
    
    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: always() && matrix.os == 'ubuntu-latest'
      with:
        name: Test Results - .NET 9 (${{ matrix.os }})
        path: 'test-results/**/*.trx'
        reporter: dotnet-trx
        fail-on-error: true
        fail-on-empty: false
    
    - name: Upload build artifacts (Linux only)
      uses: actions/upload-artifact@v4
      if: matrix.os == 'ubuntu-latest' && success()
      with:
        name: build-artifacts-net9-${{ github.sha }}
        path: |
          bin/**/net9.0/*.dll
          bin/**/net9.0/*.pdb
        retention-days: 30
        if-no-files-found: warn

  code-quality:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore MessagePack.sln
    
    - name: Run code analysis
      run: dotnet build MessagePack.sln --configuration ${{ env.CONFIGURATION }} --no-restore -p:EnableNETAnalyzers=true -p:EnforceCodeStyleInBuild=true
      continue-on-error: true

  performance-check:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && contains(github.ref, 'upgrade-to-NET9')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore MessagePack.sln
    
    - name: Build benchmarks
      run: dotnet build benchmark/SerializerBenchmark --configuration Release --no-restore
    
    - name: Run performance benchmarks (quick)
      run: |
        cd benchmark/SerializerBenchmark
        dotnet run -c Release -f net9.0 --filter "*" -- --warmupCount 1 --targetCount 1 --memory || true
      continue-on-error: true
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results-${{ github.sha }}
        path: benchmark/SerializerBenchmark/BenchmarkDotNet.Artifacts/**/*
        retention-days: 30
        if-no-files-found: ignore
